name: Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Uptime check
        id: check
        run: |
          set -e
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          code=$(curl -s -o /tmp/monitor.body -w "%{http_code}" "https://seywebsolutions.com" || true)
          status="up"
          if [ "$code" != "200" ]; then status="down"; fi
          json=$(printf '{"ts":"%s","status":"%s","code":%s}' "$ts" "$status" "$code")
          echo "$json" > public/monitor-logs/latest.json
          echo "::notice::$ts | $status ($code)"
          echo "result=$json" >> "$GITHUB_OUTPUT"

      - name: Commit status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "gh-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/monitor-logs/latest.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore(monitor): update latest.json (${{ steps.check.outputs.result }})"
          git push
